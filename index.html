<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
      <img id="suelo" src="suelos.jpg">
      <img id="pared" src="paredes.jpg">
      <img id="viga" src="vigas.jpg">
      </a-assets>
      <a-box position="0 0.1 0" rotation="0 0 0" scale="3 0.2 3" color="#9a9898" src="#suelo"></a-box>
      <a-box position="0 1.7 -1.4" rotation="90 90 90" scale="3 0.2 3" color="#e9d8d9" src="#pared"></a-box>
      <a-box position="1.4 1.7 0" rotation="90 0 90" scale="3 0.2 3" color="#e4bebe" src="#pared"></a-box>
      <a-box position="-1.4 1.7 0" rotation="90 0 90" scale="3 0.2 3" color="#e4bebe" src="#pared"></a-box>
      <a-box position="0 3.2 0" rotation="0 0 0" scale="3 0.2 3" color="#9a9898" src="#viga"></a-box>
      <a-sky color="#ECECEC" position="0 1 0" color="#ECECEC"></a-sky>
      <a-light type="ambient" color="#ECECEC" position="3 3 3"></a-light>
      <a-entity id="rig" position="-3 1 3">
  <a-camera id="camera"></a-camera>

    </a-scene>
  </body>
</html>
